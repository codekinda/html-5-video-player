<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML5 Neon Video Player</title>
    <style>
        body{
            background: #080808;
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #00faff;
        }
        
        .player{
            width: 320px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 35px #00eaff80, 0 0 15px #00eaff;
            text-align: center;
            backdrop-filter: blur(6px);
        }

          .player h3{
            margin-bottom: 20px;
            color: #00faff;
            text-shadow: 0 0 10px #00faff;
        }

        audio{
            width: 100%;
            margin-top: 10px;
            filter: drop-shadow(0 0 10px #00eaff80);
        }
    </style>
</head>
<body>
    <div class="player">
    <h3>HTML5 Neon Video Player</h3>
    <video width="340" height="260" controls autoplay muted>
        <source src="dream-to-luck.mp4" type="video/ogg">
        <source src="dream-to-luck.mp4" type="video/mp4">
        Your browser does not support this video element.
    </video>
    </div>
</body>
</html>
